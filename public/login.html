<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 · 가계부 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: "Noto Sans KR", sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">
    <form id="loginForm" class="bg-white rounded-2xl shadow-lg border border-slate-200 p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">💰</div>
            <h1 class="text-xl font-bold text-slate-800">가계부 도우미</h1>
            <p class="text-sm text-slate-500 mt-1">비밀번호를 입력하세요</p>
        </div>
        <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password"
            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition">로그인</button>
    </form>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const password = document.getElementById("password").value;
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password }),
            });
            if (res.ok) return (location.href = "/");
            const data = await res.json().catch(() => ({}));
            Swal.fire({ icon: "error", title: "로그인 실패", text: data.error || "비밀번호를 확인하세요", confirmButtonColor: "#4f46e5" });
        });
    </script>
</body>
</html>
