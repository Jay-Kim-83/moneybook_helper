<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가계부 작성 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: "Noto Sans KR", sans-serif; }
        .tab-btn.active { background-color: #4f46e5; color: #fff; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
    <header class="bg-indigo-600 text-white shadow">
        <div class="max-w-5xl mx-auto px-4 py-5 flex items-center gap-3">
            <span class="text-2xl">💰</span>
            <h1 class="text-xl font-bold">가계부 작성 도우미</h1>
            <button id="logoutBtn" class="ml-auto text-sm bg-indigo-500 hover:bg-indigo-400 px-3 py-1.5 rounded-lg transition">로그아웃</button>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 flex flex-wrap gap-2 py-3">
            <button data-tab="banks" class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">🏦 은행</button>
            <button data-tab="cards" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">💳 카드</button>
            <button data-tab="fixed" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">🧾 고정 지출</button>
            <button data-tab="overview" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">🗂️ 은행별 카드</button>
            <button data-tab="monthly" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">📅 이번달 결제</button>
            <button data-tab="history" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">📜 이력</button>
            <button data-tab="system" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 transition">⚙️ 시스템</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <section id="tab-banks" class="tab-panel"></section>
        <section id="tab-cards" class="tab-panel hidden"></section>
        <section id="tab-fixed" class="tab-panel hidden"></section>
        <section id="tab-overview" class="tab-panel hidden"></section>
        <section id="tab-monthly" class="tab-panel hidden"></section>
        <section id="tab-history" class="tab-panel hidden"></section>
        <section id="tab-system" class="tab-panel hidden"></section>
    </main>

    <script src="app.js"></script>
</body>
</html>
