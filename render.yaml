services:
  - type: web
    name: moneybook-helper
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
    disk:
      name: moneybook-data
      mountPath: /data
      sizeGB: 1
